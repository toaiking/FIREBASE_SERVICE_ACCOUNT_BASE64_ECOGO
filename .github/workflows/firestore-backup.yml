
# Firestore Backup - Thứ 2, 4, 6
# Chạy lúc 20:00 GMT+7 (13:00 UTC) — trước khi Firestore reset quota lúc 22:00 GMT+7
#
# Secrets cần cấu hình trong repo Settings → Secrets and variables → Actions:
#   FIREBASE_SERVICE_ACCOUNT_BASE64  : Service account JSON đã encode base64
#   EMAIL_USERNAME                    : Gmail gửi (vd: yourapp@gmail.com)
#   EMAIL_PASSWORD                    : App Password của Gmail
#   EMAIL_TO                          : Email nhận backup

name: Firestore Backup - T2 T4 T6

on:
  schedule:
    - cron: '0 13 * * 1,3,5'  # 20:00 GMT+7 mỗi T2, T4, T6 (UTC 13:00)
  workflow_dispatch:            # Cho phép chạy thủ công

jobs:
  backup:
    runs-on: ubuntu-latest

    env:
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js 22 ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── 3. Cài dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          cat > package.json << 'EOF'
          {
            "name": "firestore-backup",
            "version": "1.0.0",
            "dependencies": {
              "firebase-admin": "^12.0.0"
            }
          }
          EOF
          npm install

      # ── 4. Lấy ngày giờ hiện tại (Vietnam time) ─────────────────────────────
      - name: Get current date
        id: date
        run: |
          echo "today=$(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          echo "dateonly=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          # Xác định thứ trong tuần để đặt tên file rõ ràng
          DOW=$(TZ='Asia/Ho_Chi_Minh' date +'%u')  # 1=Mon,3=Wed,5=Fri
          case $DOW in
            1) DAY_NAME="T2" ;;
            3) DAY_NAME="T4" ;;
            5) DAY_NAME="T6" ;;
            *) DAY_NAME="TD" ;;
          esac
          echo "dayname=$DAY_NAME" >> $GITHUB_OUTPUT

      # ── 5. Tạo và chạy backup script ────────────────────────────────────────
      - name: Run Firestore backup
        run: |
          node - << 'EOF'
          "use strict";
          const admin = require("firebase-admin");
          const fs = require("fs");

          // Parse service account
          let serviceAccount;
          try {
            serviceAccount = JSON.parse(
              Buffer.from(process.env.FIREBASE_SERVICE_ACCOUNT_BASE64, "base64").toString("utf8")
            );
          } catch (err) {
            console.error("Loi: Khong the parse FIREBASE_SERVICE_ACCOUNT_BASE64");
            process.exit(1);
          }

          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
          });
          const db = admin.firestore();

          // Export đệ quy collection + sub-collections
          async function exportCollection(colRef) {
            const snapshot = await colRef.get();
            const result = [];
            for (const doc of snapshot.docs) {
              const raw = doc.data();
              const data = { _id: doc.id };
              for (const [k, v] of Object.entries(raw)) {
                data[k] = (v && typeof v.toDate === "function") ? v.toDate().toISOString() : v;
              }
              const subCols = await doc.ref.listCollections();
              for (const sub of subCols) {
                data[sub.id] = await exportCollection(sub);
              }
              result.push(data);
            }
            return result;
          }

          async function main() {
            const startTime = Date.now();
            console.log("=".repeat(50));
            console.log("Bat dau backup Firestore");
            console.log("Thoi gian: " + new Date().toLocaleString("vi-VN", { timeZone: "Asia/Ho_Chi_Minh" }));
            console.log("=".repeat(50));

            const backup = {
              _meta: {
                exportedAt: new Date().toISOString(),
                projectId: serviceAccount.project_id,
              },
            };

            const collections = await db.listCollections();
            if (collections.length === 0) {
              console.log("Canh bao: Khong tim thay collection nao.");
            }

            let totalDocs = 0;
            for (const col of collections) {
              console.log("Dang backup: " + col.id + " ...");
              const docs = await exportCollection(col);
              backup[col.id] = docs;
              totalDocs += docs.length;
              console.log("  -> " + docs.length + " documents");
            }

            const date = new Date().toISOString().slice(0, 10);
            const filename = "backup-" + date + ".json";
            fs.writeFileSync(filename, JSON.stringify(backup, null, 2), "utf8");

            const fileSizeKB = (fs.statSync(filename).size / 1024).toFixed(1);
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

            console.log("=".repeat(50));
            console.log("Backup hoan tat : " + filename);
            console.log("Tong collections: " + (Object.keys(backup).length - 1));
            console.log("Tong documents  : " + totalDocs);
            console.log("Kich thuoc file : " + fileSizeKB + " KB");
            console.log("Thoi gian chay  : " + elapsed + "s");
            console.log("=".repeat(50));
          }

          main()
            .then(() => process.exit(0))
            .catch((err) => {
              console.error("LOI BACKUP:", err.message || err);
              process.exit(1);
            });
          EOF

      # ── 6. Upload artifact (lưu 90 ngày) ────────────────────────────────────
      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestore-backup-${{ steps.date.outputs.dateonly }}-${{ steps.date.outputs.dayname }}
          path: backup-*.json
          retention-days: 90

      # ── 7. Trigger dashboard build ───────────────────────────────────────────
      - name: Trigger dashboard build
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: backup-completed
          client-payload: '{"date": "${{ steps.date.outputs.dateonly }}", "day": "${{ steps.date.outputs.dayname }}"}'

      # ── 8. Gửi email khi thành công ──────────────────────────────────────────
      - name: Send backup via email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.EMAIL_USERNAME }}
          password: ${{ env.EMAIL_PASSWORD }}
          to: ${{ env.EMAIL_TO }}
          from: "EcoGo Backup <${{ env.EMAIL_USERNAME }}>"
          subject: "[Backup ${{ steps.date.outputs.dayname }}] Firestore - ${{ steps.date.outputs.today }}"
          body: |
            ✅ Backup Firestore hoàn tất thành công!

            Ngày backup : ${{ steps.date.outputs.today }} (GMT+7)
            Lịch backup : Thứ 2, 4, 6 lúc 20:00 GMT+7
            Repository  : ${{ github.repository }}
            Chi tiết    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            File backup được đính kèm bên dưới.
            File cũng được lưu trên GitHub Artifacts trong 90 ngày.

            ---
            Email này được gửi tự động bởi GitHub Actions.
          attachments: backup-*.json

      # ── 9. Gửi email khi thất bại ────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.EMAIL_USERNAME }}
          password: ${{ env.EMAIL_PASSWORD }}
          to: ${{ env.EMAIL_TO }}
          from: "EcoGo Backup <${{ env.EMAIL_USERNAME }}>"
          subject: "[THẤT BẠI] Firestore Backup ${{ steps.date.outputs.dayname }} - ${{ steps.date.outputs.today }}"
          body: |
            ❌ CẢNH BÁO: Backup Firestore thất bại!

            Ngày       : ${{ steps.date.outputs.today }} (GMT+7)
            Repository : ${{ github.repository }}
            Chi tiết   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Vui lòng kiểm tra log để biết nguyên nhân.
