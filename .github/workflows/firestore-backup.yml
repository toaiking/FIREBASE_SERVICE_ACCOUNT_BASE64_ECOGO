name: Firestore Weekly Backup - Thứ 4

on:
  schedule:
    - cron: '0 5 * * 3'    # 12:00 trưa thứ 4 (Giờ Việt Nam)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
      # === Email configuration (bạn cần thêm secrets) ===
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}          # Email nhận backup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Create and run backup script
        run: |
          cat > backup.js << 'EOF'
          const admin = require("firebase-admin");
          const fs = require("fs");

          const serviceAccount = JSON.parse(
            Buffer.from(process.env.FIREBASE_SERVICE_ACCOUNT_BASE64, 'base64').toString()
          );

          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });

          const db = admin.firestore();

          async function exportCollection(colRef) {
            const snapshot = await colRef.get();
            const result = [];
            for (const doc of snapshot.docs) {
              const data = { id: doc.id, ...doc.data() };
              const subCols = await doc.ref.listCollections();
              for (const subCol of subCols) {
                data[subCol.id] = await exportSubCollection(subCol);
              }
              result.push(data);
            }
            return result;
          }

          async function exportSubCollection(colRef) {
            const snapshot = await colRef.get();
            const result = [];
            for (const doc of snapshot.docs) {
              const data = { id: doc.id, ...doc.data() };
              const subCols = await doc.ref.listCollections();
              for (const subCol of subCols) {
                data[subCol.id] = await exportSubCollection(subCol);
              }
              result.push(data);
            }
            return result;
          }

          async function main() {
            console.log("🔄 Bắt đầu backup Firestore - " + new Date().toLocaleString('vi-VN'));
            
            const backup = {};
            const collections = await db.listCollections();

            for (const col of collections) {
              console.log(`📁 Đang backup: ${col.id}`);
              backup[col.id] = await exportCollection(col);
            }

            const date = new Date().toISOString().slice(0, 10);
            const filename = `backup-${date}.json`;
            
            fs.writeFileSync(filename, JSON.stringify(backup, null, 2));
            
            console.log(`✅ Backup hoàn tất: ${filename}`);
            console.log(`📊 Tổng collections: ${Object.keys(backup).length}`);
          }

          main()
            .then(() => process.exit(0))
            .catch(error => {
              console.error("❌ Lỗi backup:", error);
              process.exit(1);
            });
          EOF

          node backup.js

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestore-backup
          path: backup-*.json
          retention-days: 60

      - name: Send backup via email
        if: success()  # Chỉ gửi nếu backup thành công
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.EMAIL_USERNAME }}
          password: ${{ env.EMAIL_PASSWORD }}
          subject: "📦 Firestore Backup - ${{ github.event_name == 'schedule' && 'Weekly' || 'Manual' }} - ${{ format(date, 'yyyy-MM-dd') }}"
          to: ${{ env.EMAIL_TO }}
          from: "Firestore Backup <${{ env.EMAIL_USERNAME }}>"
          body: |
            Backup Firestore hàng tuần đã hoàn tất thành công!
            
            📅 Ngày: ${{ format(date, 'yyyy-MM-dd HH:mm') }}
            🔗 Repository: ${{ github.repository }}
            🏃 Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            File backup đính kèm bên dưới.
          attachments: backup-*.json
          secure: true
